<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FLOW - Voice Input</title>
<!-- Tajawal Font for Arabic -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
--purple-50: #faf5ff;
--purple-100: #f3e8ff;
--purple-200: #e9d5ff;
--purple-500: #a855f7;
--purple-600: #9333ea;
--purple-700: #7e22ce;
--purple-800: #6b21a8;
--white: #ffffff;
--gray-400: #9ca3af;
--gray-500: #6b7280;
--gray-900: #111827;
}

* {
box-sizing: border-box;
margin: 0;
padding: 0;
}

body {
font-family: 'Tajawal', sans-serif;
/* Dark purple gradient matching the React version */
background: linear-gradient(135deg, var(--purple-600), var(--purple-800));
color: var(--white);
height: 100dvh;
display: flex;
flex-direction: column;
overflow: hidden;
}

/* Header & Back Button */
.header {
padding: 1.5rem;
display: flex;
align-items: center;
}

.back-btn {
width: 2.5rem;
height: 2.5rem;
background-color: rgba(255, 255, 255, 0.2);
border-radius: 50%;
border: none;
display: flex;
align-items: center;
justify-content: center;
color: var(--white);
cursor: pointer;
backdrop-filter: blur(4px);
transition: background-color 0.2s;
}

.back-btn:hover {
background-color: rgba(255, 255, 255, 0.3);
}

/* Main Content Area */
.main-content {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 0 2rem 5rem 2rem;
text-align: center;
}

.status-title {
font-size: 1.875rem;
font-weight: 700;
margin-bottom: 0.5rem;
transition: all 0.3s ease;
}

.status-desc {
font-size: 1rem;
color: var(--purple-100);
margin-bottom: 4rem;
max-width: 20rem;
line-height: 1.5;
}

/* Center Microphone Container */
.mic-container {
position: relative;
width: 10rem;
height: 10rem;
display: flex;
align-items: center;
justify-content: center;
margin-bottom: 3rem;
}

/* CSS Only Voice Wave Animations */
.wave {
position: absolute;
top: 0; left: 0; right: 0; bottom: 0;
border-radius: 50%;
background-color: rgba(255, 255, 255, 0.3);
z-index: 1;
opacity: 0;
pointer-events: none;
}

/* Classes applied via JS when recording starts */
.is-recording .wave-1 { animation: ripple 2s infinite linear; }
.is-recording .wave-2 { animation: ripple 2s infinite linear 0.6s; }
.is-recording .wave-3 { animation: ripple 2s infinite linear 1.2s; }

@keyframes ripple {
0% {
transform: scale(1);
opacity: 0.8;
}
100% {
transform: scale(2.5);
opacity: 0;
}
}

/* Microphone Button */
.mic-btn {
position: relative;
width: 10rem;
height: 10rem;
background-color: var(--white);
border-radius: 50%;
border: none;
display: flex;
align-items: center;
justify-content: center;
z-index: 10;
box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
cursor: pointer;
color: var(--purple-600);
transition: transform 0.2s ease, background-color 0.3s ease;
}

.mic-btn svg {
width: 4rem;
height: 4rem;
transition: transform 0.3s ease;
}

.mic-btn:active {
transform: scale(0.95);
}

/* Pulsing animation for the Mic Icon when recording */
.is-recording .mic-btn svg {
animation: mic-pulse 1.5s infinite alternate;
}

@keyframes mic-pulse {
0% { transform: scale(1); }
100% { transform: scale(1.1); color: var(--purple-800); }
}

/* Processing and Success Elements (Hidden by Default) */
.action-group {
display: flex;
flex-direction: column;
width: 100%;
gap: 1rem;
max-width: 20rem;
opacity: 0;
pointer-events: none;
transform: translateY(20px);
transition: all 0.5s ease;
position: absolute;
bottom: 6rem;
}

.action-group.show {
opacity: 1;
pointer-events: auto;
transform: translateY(0);
}

.btn-action {
width: 100%;
padding: 1rem;
border-radius: 1rem;
border: none;
font-family: inherit;
font-size: 1.125rem;
font-weight: 600;
display: flex;
align-items: center;
justify-content: center;
gap: 0.5rem;
cursor: pointer;
transition: transform 0.2s ease, opacity 0.2s;
}

.btn-action:active { transform: scale(0.98); }
.btn-play {
background-color: var(--white);
color: var(--purple-700);
box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
}

.btn-retry {
background-color: rgba(255, 255, 255, 0.2);
color: var(--white);
}

</style>
</head>
<body>

<div class="header">
<button class="back-btn" onclick="window.location.href='home.html'">
<!-- Arrow Right for RTL -->
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
</svg>
</button>
</div>

<div class="main-content">
<h2 id="status-title" class="status-title">الإدخال الصوتي</h2>
<p id="status-desc" class="status-desc">اضغط على الميكروفون للبدء بالتحدث</p>

<!-- Microphone & Waves Container -->
<div class="mic-container" id="mic-wrapper">
<div class="wave wave-1"></div>
<div class="wave wave-2"></div>
<div class="wave wave-3"></div>
<button class="mic-btn" id="mic-btn">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
<path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
<line x1="12" x2="12" y1="19" y2="22"/>
</svg>
</button>
</div>

<!-- Hidden Action Buttons (Show after processing) -->
<div class="action-group" id="action-group">
<button class="btn-action btn-play" onclick="resetState()">
<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<polygon points="6 3 20 12 6 21 6 3"/>
</svg>
تشغيل النص المصحح
</button>
<button class="btn-action btn-retry" onclick="resetState()">
<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
</svg>
إعادة المحاولة
</button>
</div>
</div>

<!-- Interactive JavaScript Demo for UI States -->
<script>
const micWrapper = document.getElementById('mic-wrapper');
const micBtn = document.getElementById('mic-btn');
const title = document.getElementById('status-title');
const desc = document.getElementById('status-desc');
const actionGroup = document.getElementById('action-group');
let isRecording = false;

micBtn.addEventListener('click', () => {
if (!isRecording) {
// Start Recording State
isRecording = true;
micWrapper.classList.add('is-recording');
title.innerText = 'جاري الاستماع...';
desc.innerText = 'تحدث بحرية، نحن نستمع ونحلل كلامك';
// Simulate recording duration then auto-stop
setTimeout(() => {
stopRecording();
}, 4000);
}
});

function stopRecording() {
// Processing State
isRecording = false;
micWrapper.classList.remove('is-recording');
micWrapper.style.transform = 'scale(0.8)';
micWrapper.style.opacity = '0.5';
title.innerText = 'جاري المعالجة...';
desc.innerText = 'الذكاء الاصطناعي يقوم بتحسين طلاقة النص';

// Simulate AI Processing delay
setTimeout(() => {
showSuccess();
}, 2000);
}

function showSuccess() {
micWrapper.style.display = 'none';
title.innerText = 'تم التحسين بنجاح!';
desc.innerText = 'النص الطليق جاهز للتشغيل الآن بصوت طبيعي';
actionGroup.classList.add('show');
}

function resetState() {
micWrapper.style.display = 'flex';
micWrapper.style.transform = 'scale(1)';
micWrapper.style.opacity = '1';
title.innerText = 'الإدخال الصوتي';
desc.innerText = 'اضغط على الميكروفون للبدء بالتحدث';
actionGroup.classList.remove('show');
isRecording = false;
}
</script>

<nav class="bottom-nav">
    <div class="nav-container">
      
      <button class="nav-btn active" onclick="window.location.href='{{ url_for('home') }}'">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>الرئيسية</span>
      </button>

      <button class="record-btn-container" onclick="window.location.href='{{ url_for('voice_input') }}'">
        <div class="record-circle">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/>
          </svg>
        </div>
        <span>تسجيل</span>
      </button>

      <button class="nav-btn" onclick="window.location.href='{{ url_for('profile') }}'">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
        <span>حسابي</span>
      </button>

    </div>
  </nav>

</body>
</html>
