<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FLOW - Profile</title>
  
  <!-- Tajawal Font for Arabic -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --purple-50: #faf5ff;
      --purple-100: #f3e8ff;
      --purple-200: #e9d5ff;
      --purple-300: #d8b4fe;
      --purple-400: #c084fc;
      --purple-500: #a855f7;
      --purple-600: #9333ea;
      --purple-700: #7e22ce;
      --purple-800: #6b21a8;
      --purple-900: #581c87;
      
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-900: #111827;
      
      --green-500: #22c55e;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      background-color: var(--gray-50);
      color: var(--gray-900);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Main Scrollable Content */
    .scroll-container {
      flex: 1;
      overflow-y: auto;
      padding: 3rem 1.5rem 6rem 1.5rem; /* Bottom padding for nav */
      scrollbar-width: none;
    }
    
    .scroll-container::-webkit-scrollbar {
      display: none;
    }

    /* Animations */
    @keyframes fade-in {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .animate-fade {
      animation: fade-in 0.5s ease forwards;
    }

    /* User Info Card */
    .card {
      background-color: var(--white);
      border-radius: 1.5rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    }

    .user-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .avatar {
      width: 5rem;
      height: 5rem;
      background: linear-gradient(to bottom right, var(--purple-600), var(--purple-800));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-size: 1.5rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .user-info h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 0.125rem;
    }

    .user-info p {
      font-size: 0.875rem;
      color: var(--gray-500);
      margin-bottom: 0.5rem;
    }

    .badge-premium {
      display: inline-block;
      background-color: var(--purple-100);
      color: var(--purple-700);
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
    }

    .stat-item {
      background-color: var(--purple-50);
      border-radius: 0.75rem;
      padding: 0.75rem;
      text-align: center;
    }

    .stat-item svg {
      width: 1.25rem;
      height: 1.25rem;
      color: var(--purple-600);
      margin: 0 auto 0.25rem auto;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--gray-600);
      margin-bottom: 0.25rem;
    }

    .stat-value {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--gray-900);
    }

    /* Progress Section */
    .section-title {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 1rem;
    }

    .progress-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .progress-header h3 {
      font-size: 1rem;
      font-weight: 700;
    }

    .progress-group {
      margin-bottom: 1.5rem;
    }

    .progress-labels {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .progress-labels .label {
      font-size: 0.875rem;
      color: var(--gray-600);
    }

    .progress-labels .value {
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--gray-900);
    }

    /* Bar Chart for Fluency */
    .chart-container {
      position: relative;
      height: 8rem;
      background-color: var(--gray-50);
      border-radius: 0.75rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-around;
      padding: 0.75rem;
    }

    .chart-column {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      height: 100%;
      justify-content: flex-end;
    }

    .chart-bar {
      width: 2rem;
      background: linear-gradient(to top, var(--purple-500), var(--purple-300));
      border-radius: 0.25rem 0.25rem 0 0;
      transition: height 1s ease-out;
    }

    .chart-label {
      font-size: 0.75rem;
      color: var(--gray-500);
    }

    /* Horizontal Progress Bars */
    .progress-track {
      width: 100%;
      height: 0.75rem;
      background-color: var(--gray-100);
      border-radius: 9999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 9999px;
      transition: width 1s ease-out;
    }

    .fill-confidence {
      background: linear-gradient(to right, var(--purple-500), var(--purple-700));
      width: 78%;
    }

    .fill-consistency {
      background: linear-gradient(to right, var(--purple-600), var(--purple-800));
      width: 92%;
    }

    /* Achievement Alert */
    .achievement-card {
      background: linear-gradient(to bottom right, var(--purple-50), var(--purple-100));
      border: 2px solid var(--purple-200);
      border-radius: 1.5rem;
      padding: 1.5rem;
      margin-top: 1.5rem;
    }

    .achievement-card svg {
      width: 2rem;
      height: 2rem;
      color: var(--purple-700);
      margin-bottom: 0.75rem;
    }

    .achievement-card h3 {
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 0.5rem;
    }

    .achievement-card p {
      font-size: 0.875rem;
      color: var(--gray-700);
      line-height: 1.5;
    }

    /* Bottom Navigation Bar */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background-color: var(--white);
      border-top: 1px solid var(--gray-200);
      padding: 0.75rem 1.5rem;
      padding-bottom: calc(0.75rem + env(safe-area-inset-bottom));
      z-index: 50;
    }

    .nav-container {
      max-width: 28rem;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
    }

    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      padding: 0.5rem 1.5rem;
      background: none;
      border: none;
      cursor: pointer;
      border-radius: 0.75rem;
      transition: color 0.2s;
      font-family: inherit;
      color: var(--gray-400);
    }

    .nav-btn.active { color: var(--purple-600); }
    .nav-btn span { font-size: 0.75rem; font-weight: 500; }
    .nav-btn:not(.active) span { color: var(--gray-500); }

    /* Floating Center Record Button */
    .record-btn-container {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: -1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    .record-circle {
      width: 4rem;
      height: 4rem;
      background: linear-gradient(to bottom right, var(--purple-500), var(--purple-700));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s ease;
    }

    .record-btn-container:hover .record-circle {
      transform: scale(1.05);
    }

    .record-btn-container span {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--gray-500);
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>
