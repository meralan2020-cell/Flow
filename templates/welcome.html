<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FLOW - Welcome</title>
  
  <!-- Tajawal Font from Google Fonts for Arabic -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* CSS Reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      /* Background matches: bg-gradient-to-b from-purple-50 to-white */
      background: linear-gradient(to bottom, #faf5ff, #ffffff);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      color: #111827; /* text-gray-900 */
    }

    /* Main Container with Padding */
    .screen-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 2rem;
    }

    @keyframes fade-up {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-up {
      animation: fade-up 0.6s ease-out forwards;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    /* Sparkles Icon Container */
    .icon-container {
      /* Matches: w-48 h-48 */
      width: 12rem;
      height: 12rem;
      /* Matches: bg-gradient-to-br from-purple-500 to-purple-700 */
      background: linear-gradient(to bottom right, #a855f7, #7e22ce);
      border-radius: 50%;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      color: #ffffff;
    }

    /* Typography */
    .title {
      /* Matches: text-3xl font-bold mb-4 */
      font-size: 1.875rem;
      line-height: 2.25rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 1rem;
      text-align: center;
    }

    .description {
      /* Matches: text-center text-gray-600 mb-12 max-w-md leading-relaxed */
      text-align: center;
      color: #4b5563;
      margin-bottom: 3rem;
      max-width: 28rem;
      line-height: 1.625;
      font-size: 1.125rem;
    }

    /* Get Started Button */
    .start-btn {
      /* Matches: w-full max-w-sm bg-purple-600 text-white py-4 px-8 rounded-2xl font-semibold shadow-lg */
      width: 100%;
      max-width: 24rem;
      background-color: #9333ea;
      color: #ffffff;
      padding: 1rem 2rem;
      border-radius: 1rem;
      font-weight: 600;
      font-size: 1.125rem;
      border: none;
      cursor: pointer;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      transition: background-color 0.2s ease-in-out;
      font-family: inherit;
    }

    .start-btn:hover {
      /* Matches: hover:bg-purple-700 */
      background-color: #7e22ce;
    }

    .start-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

  <div class="screen-container">
    <div class="animate-fade-up">
      
      <!-- Icon Container -->
      <div class="icon-container">
        <!-- Lucide Sparkles SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
        </svg>
      </div>

      <!-- Text Content -->
      <h1 class="title">مرحباً بك في FLOW</h1>
      
      <p class="description">
        رفيقك الشخصي المساعد في التلعثم والمدعوم بالذكاء الاصطناعي. تدرّب على الطلاقة، وتتبع تقدمك، وابنِ ثقتك بنفسك مع نظام التدريب الذكي لدينا.
      </p>

      <button class="start-btn" onclick="window.location.href='{{ url_for('register') }}'">
  ابدأ الآن
</button>

    </div>
  </div>

</body>
</html>
