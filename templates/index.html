<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta http-equiv="refresh" content="4;url={{ url_for('welcome') }}">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FLOW - Splash Screen</title>

  <style>
    /* CSS Reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Screen Container */
    body {
      /* Matches: bg-gradient-to-br from-purple-900 via-purple-600 to-purple-400 */
      background: linear-gradient(to bottom right, #581c87, #9333ea, #c084fc);
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* Animation equivalent to framer-motion's initial/animate */
    @keyframes splash-intro {
      0% {
        transform: scale(0.8);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: splash-intro 1s cubic-bezier(0, 0, 0.2, 1) forwards;
    }

    /* Logo Image Styles */
    .logo-img {
      /* Matches: w-64 h-64 (16rem = 256px) */
      width: 16rem;
      height: 16rem;
      object-fit: contain;
      /* This is exactly what was used in the TSX file to blend the JPEG's white background */
      mix-blend-mode: multiply; /* هذا السطر سيجعل الخلفية البيضاء للصورة تختفي وتندمج مع البنفسجي */
      border-radius: 2rem;
    }

  </style>
</head>
<body>

  <div class="logo-container">
    <!-- 
      Note: Replace this entire <svg> block with your actual <img> tag.
      Example: <img src="IMG_0840.jpeg" alt="FLOW Logo" class="logo-img" />
      
      This SVG uses a white background so 'mix-blend-mode: multiply' behaves 
      exactly as it would with your JPEG, showing off the seamless gradient.
    -->
<img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">      
      <!-- Abstract modern sound wave / medical cross aesthetic -->
      <g transform="translate(128, 128)">
        <rect x="-12" y="-60" width="24" height="120" rx="12" fill="#1a1a1a" />
        <rect x="-40" y="-30" width="24" height="60" rx="12" fill="#1a1a1a" />
        <rect x="16" y="-40" width="24" height="80" rx="12" fill="#1a1a1a" />
        <rect x="-68" y="-15" width="24" height="30" rx="12" fill="#1a1a1a" />
        <rect x="44" y="-20" width="24" height="40" rx="12" fill="#1a1a1a" />
      </g>
    </svg>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      setTimeout(() => {
    window.location.href = "{{ url_for('welcome') }}";
    console.log("4 seconds passed - Navigating to Welcome Screen...");
}, 4000);
        
        // Visual cue for the demo snippet
        document.body.style.opacity = "0";
        document.body.style.transition = "opacity 0.5s ease";
      }, 4000);
    });
  </script>

</body>
</html>
