<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FLOW - Home</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --purple-50: #faf5ff;
      --purple-100: #f3e8ff;
      --purple-200: #e9d5ff;
      --purple-400: #c084fc;
      --purple-500: #a855f7;
      --purple-600: #9333ea;
      --purple-700: #7e22ce;
      --purple-800: #6b21a8;
      --purple-900: #581c87;
      --gray-200: #e5e7eb;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-900: #111827;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

body {
  font-family: 'Tajawal', sans-serif;
  background: linear-gradient(to bottom, var(--purple-50), var(--white));
  color: var(--gray-900);
  min-height: 100vh; /* غيرناها من height لـ min-height */
  display: flex;
  flex-direction: column;
  /* حذفنا overflow: hidden عشان نسمح بالنزول */
}

   /* Main Scrollable Content */
.scroll-container {
  flex: 1;
  padding: 2rem 1.5rem 8rem 1.5rem; /* زدنا المساحة تحت عشان ما يغطي شريط التنقل على المحتوى */
  max-width: 600px; 
  width: 100%;
  margin: 0 auto;
  /* حذفنا overflow-y والـ webkit-scrollbar عشان يشتغل النزول الطبيعي للمتصفح */
}
    
    .scroll-container::-webkit-scrollbar {
      display: none; /* Safari/Chrome */
    }

    /* Animations */
    @keyframes fade-in {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    @keyframes slide-up {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .fade-in { animation: fade-in 0.5s ease forwards; }
    
    .slide-up {
      opacity: 0;
      animation: slide-up 0.5s ease forwards;
    }

    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }

    /* Header */
    .logo-container {
      display: flex;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .logo-img {
      width: 6rem;
      height: 6rem;
      object-fit: contain;
    }

    .header-text { margin-bottom: 2rem; text-align: center; }
    .header-text h1 { font-size: 1.875rem; font-weight: 700; margin-bottom: 0.5rem; }
    .header-text p { color: var(--gray-600); font-size: 1rem; }

    /* AI Agents Cards */
    .agents-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .agent-card {
      width: 100%;
      text-align: right;
      background: linear-gradient(to bottom right, var(--purple-50), var(--purple-100));
      border: 2px solid var(--purple-200);
      border-radius: 1rem;
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .agent-card:hover {
      border-color: var(--purple-400);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      transform: translateY(-2px);
    }

    .agent-card-top {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }

    .agent-icon-box {
      width: 3.5rem;
      height: 3.5rem;
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      color: white;
    }

    .icon-grad-1 { background: linear-gradient(to bottom right, var(--purple-600), var(--purple-800)); }
    .icon-grad-2 { background: linear-gradient(to bottom right, var(--purple-500), var(--purple-700)); }
    .icon-grad-3 { background: linear-gradient(to bottom right, var(--purple-400), var(--purple-600)); }

    .agent-info { flex: 1; }
    .agent-info h3 { font-size: 1.125rem; font-weight: 700; margin-bottom: 0.25rem; color: var(--gray-900); }
    .agent-info p { font-size: 0.875rem; color: var(--gray-600); line-height: 1.6; }
    
    .agent-emoji { font-size: 1.5rem; }

    .ai-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background-color: rgba(255, 255, 255, 0.6);
      padding: 0.5rem 0.75rem;
      border-radius: 0.5rem;
      margin-top: 1rem;
    }

    .ai-badge span {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--purple-900);
    }

    /* Stats Card */
    .stats-card {
      margin-top: 1.5rem;
      background: linear-gradient(to bottom right, var(--purple-600), var(--purple-800));
      border-radius: 1rem;
      padding: 1.5rem;
      color: white;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    .stats-card h3 {
      font-size: 1.125rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      text-align: center;
    }

    .stats-value { font-size: 1.5rem; font-weight: 700; }
    .stats-label { font-size: 0.75rem; color: var(--purple-200); margin-top: 0.25rem; }

    /* Bottom Navigation Bar */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background-color: var(--white);
      border-top: 1px solid var(--gray-200);
      padding: 0.75rem 1.5rem;
      padding-bottom: calc(0.75rem + env(safe-area-inset-bottom));
      z-index: 50;
    }

    .nav-container {
      max-width: 28rem;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
    }

    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      padding: 0.5rem 1.5rem;
      background: none;
      border: none;
      cursor: pointer;
      border-radius: 0.75rem;
      transition: color 0.2s;
      font-family: inherit;
      color: var(--gray-400);
    }

    .nav-btn.active { color: var(--purple-600); }
    .nav-btn span { font-size: 0.75rem; font-weight: 500; }
    
    .nav-btn:not(.active) span { color: var(--gray-500); }

    /* Floating Center Record Button */
    .record-btn-container {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: -1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      text-decoration: none;
    }

    .record-circle {
      width: 4rem;
      height: 4rem;
      background: linear-gradient(to bottom right, var(--purple-500), var(--purple-700));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s ease;
    }

    .record-btn-container:hover .record-circle {
      transform: scale(1.05);
    }

    .record-btn-container span {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--gray-500);
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>

  <div class="scroll-container fade-in">
    
    <div class="logo-container">
      <img src="logo.png" alt="FLOW Logo" class="logo-img" />
    </div>

    <div class="header-text">
      <h1>مرحباً بك في FLOW</h1>
      <p>اختر مساعد الذكاء الاصطناعي للبدء</p>
    </div>

    <div class="agents-list">
      
      <button class="agent-card slide-up delay-1" onclick="window.location.href='#'">
        <div class="agent-card-top">
          <div class="agent-icon-box icon-grad-1">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>
            </svg>
          </div>
          <div class="agent-info">
            <h3>المدرب الذكي</h3>
            <p>مدرب الطلاقة الشخصي المتاح على مدار الساعة</p>
          </div>
          <div class="agent-emoji">🎯</div>
        </div>
        <div class="ai-badge">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7e22ce" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
          <span>مدعوم بالذكاء الاصطناعي</span>
        </div>
      </button>

      <button class="agent-card slide-up delay-2" onclick="window.location.href='#'">
        <div class="agent-card-top">
          <div class="agent-icon-box icon-grad-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/>
            </svg>
          </div>
          <div class="agent-info">
            <h3>المساعد اللحظي</h3>
            <p>تدريب محادثة لحظي بالذكاء الاصطناعي لكلام طبيعي</p>
          </div>
          <div class="agent-emoji">💬</div>
        </div>
        <div class="ai-badge">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7e22ce" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
          <span>مدعوم بالذكاء الاصطناعي</span>
        </div>
      </button>

      <button class="agent-card slide-up delay-3" onclick="window.location.href='#'">
        <div class="agent-card-top">
          <div class="agent-icon-box icon-grad-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 13.5V4a2 2 0 0 1 2-2h8.5L20 7.5V20a2 2 0 0 1-2 2h-5.5"/><polyline points="14 2 14 8 20 8"/><path d="M10.42 12.61a2.1 2.1 0 1 1 2.97 2.97L7.95 21 4 22l.99-3.95 5.43-5.44Z"/>
            </svg>
          </div>
          <div class="agent-info">
            <h3>مساعد تجهيز المحتوى</h3>
            <p>جهز وتدرب على خطاباتك بمساعدة الذكاء الاصطناعي</p>
          </div>
          <div class="agent-emoji">📝</div>
        </div>
        <div class="ai-badge">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7e22ce" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
          <span>مدعوم بالذكاء الاصطناعي</span>
        </div>
      </button>

    </div>

    <div class="stats-card slide-up delay-4">
      <h3>تقدمك اليوم</h3>
      <div class="stats-grid">
        <div>
          <p class="stats-value">12</p>
          <p class="stats-label">جلسات</p>
        </div>
        <div>
          <p class="stats-value">87%</p>
          <p class="stats-label">الطلاقة</p>
        </div>
        <div>
          <p class="stats-value">42</p>
          <p class="stats-label">دقائق</p>
        </div>
      </div>
    </div>

  </div>

  <nav class="bottom-nav">
    <div class="nav-container">
      
      <button class="nav-btn active" onclick="window.location.href='{{ url_for('home') }}'">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>الرئيسية</span>
      </button>

      <button class="record-btn-container" onclick="window.location.href='{{ url_for('voice_input') }}'">
        <div class="record-circle">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/>
          </svg>
        </div>
        <span>تسجيل</span>
      </button>

      <button class="nav-btn" onclick="window.location.href='{{ url_for('profile') }}'">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
        <span>حسابي</span>
      </button>

    </div>
  </nav>

</body>
</html>
