<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FLOW - Sign In</title>
  
  <!-- Tajawal Font from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* CSS Reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      background-color: #ffffff; /* bg-white */
      height: 100dvh;
      display: flex;
      flex-direction: column;
      color: #111827; /* text-gray-900 */
    }

    /* Main Layout */
    .screen-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 4rem 2rem 2rem 2rem; /* pt-16 px-8 */
    }

    /* Simple Fade In Animation */
    @keyframes fade-in {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    .animate-fade-in {
      animation: fade-in 0.5s ease-out forwards;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* Typography */
    .title {
      font-size: 1.875rem; /* text-3xl */
      font-weight: 700;
      margin-bottom: 0.5rem; /* mb-2 */
    }

    .subtitle {
      color: #6b7280; /* text-gray-500 */
      font-size: 1rem;
      margin-bottom: 3rem; /* mb-12 */
    }

    /* Form and Inputs */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 1rem; /* space-y-4 */
      margin-bottom: 2rem; /* mb-8 */
    }

    .input-wrapper {
      position: relative;
      width: 100%;
    }

    .input-icon {
      position: absolute;
      /* Positioned on the right for RTL */
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      width: 1.25rem;
      height: 1.25rem;
      color: #9ca3af; /* text-gray-400 */
      pointer-events: none; /* Prevents icon from blocking clicks */
    }

    .form-input {
      width: 100%;
      /* Padding adjusted for RTL: larger padding on the right to accommodate the icon */
      padding: 1rem 3rem 1rem 1rem; 
      border: 1px solid #e5e7eb; /* border-gray-200 */
      border-radius: 0.75rem; /* rounded-xl */
      font-size: 1rem;
      font-family: inherit;
      color: #111827;
      background-color: #ffffff;
      transition: all 0.2s ease-in-out;
    }

    .form-input::placeholder {
      color: #9ca3af;
    }

    .form-input:focus {
      outline: none;
      border-color: #a855f7; /* focus:ring-purple-500 base */
      box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.2);
    }

    /* Primary Button */
    .btn-primary {
      width: 100%;
      background-color: #9333ea; /* bg-purple-600 */
      color: #ffffff;
      padding: 1rem;
      border-radius: 0.75rem; /* rounded-xl */
      font-weight: 600;
      font-size: 1.125rem;
      border: none;
      cursor: pointer;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      transition: background-color 0.2s ease;
      margin-bottom: 1.5rem; /* mb-6 */
      font-family: inherit;
    }

    .btn-primary:hover {
      background-color: #7e22ce; /* hover:bg-purple-700 */
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    /* Secondary Button / Text Link */
    .btn-secondary {
      background: none;
      border: none;
      color: #9333ea; /* text-purple-600 */
      font-weight: 500;
      font-size: 1rem;
      text-align: center;
      cursor: pointer;
      font-family: inherit;
      width: 100%;
      padding: 0.5rem;
    }

    .btn-secondary:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="screen-container">
    <div class="animate-fade-in">
      
      <!-- Header Text -->
      <h1 class="title">تسجيل الدخول</h1>
      <p class="subtitle">مرحباً بعودتك</p>

      <!-- Input Fields Container -->
      <div class="form-group">
        
        <!-- Email Input -->
        <div class="input-wrapper">
          <!-- Lucide Mail Icon -->
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="20" height="16" x="2" y="4" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
          <input type="email" class="form-input" placeholder="البريد الإلكتروني">
        </div>

        <!-- Password Input -->
        <div class="input-wrapper">
          <!-- Lucide Lock Icon -->
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" class="form-input" placeholder="كلمة المرور">
        </div>

      </div>

      <!-- Actions -->
      <button class="btn-primary" onclick="window.location.href='home.html'">
        تسجيل الدخول
      </button>

      <button class="btn-secondary" onclick="window.location.href='register.html'">
        هل أنت مستخدم جديد؟
      </button>

    </div>
  </div>

</body>
</html>
